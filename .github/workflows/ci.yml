name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # Prisma needs a schema-valid DATABASE_URL to generate the client,
      # even though no real DB connection is made during `generate`.
      - run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/caltrax"
          DIRECT_URL: "postgresql://user:pass@localhost:5432/caltrax"

      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npm run build
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/caltrax"
          DIRECT_URL: "postgresql://user:pass@localhost:5432/caltrax"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "sb_publishable_placeholder"
